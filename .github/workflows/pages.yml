name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Pages
    permissions:
      contents: read
      pages: write
      id-token: write
      packages: read
    uses: moritzbrantner/reusable-workflows/.github/workflows/deploy-pages.yml@workflow-standard-v1
    with:
      build_command: STORYBOOK_PAGES_BUILD_ID=${{ github.sha }} bun run build-storybook:pages
      artifact_path: storybook-static
      concurrency_group: pages
      cancel_in_progress: false
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
