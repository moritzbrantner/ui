name: Publish to npm
run-name: Publish to npm (${{ inputs.npm_tag || 'latest' }}, dry_run=${{ inputs.dry_run || false }})

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag to publish"
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - canary
      dry_run:
        description: "Run verification and publish dry-run without uploading"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium

      - name: Verify release contract
        run: bun run verify:release:ci

      - name: Verify npm supports trusted publishing
        run: |
          node --version
          npm --version
          node - <<'EOF'
          const { execFileSync } = require("node:child_process");

          function parse(version) {
            const match = version.trim().match(/^v?(\d+)\.(\d+)\.(\d+)/);
            if (!match) {
              throw new Error(`Could not parse version: ${version}`);
            }
            return match.slice(1).map(Number);
          }

          function assertAtLeast(name, actual, minimum) {
            const current = parse(actual);
            const required = parse(minimum);
            for (let index = 0; index < required.length; index += 1) {
              if (current[index] > required[index]) return;
              if (current[index] < required[index]) {
                throw new Error(`${name} ${actual.trim()} is too old; expected ${minimum} or newer`);
              }
            }
          }

          assertAtLeast("Node", process.version, "22.14.0");
          assertAtLeast("npm", execFileSync("npm", ["--version"], { encoding: "utf8" }), "11.5.1");
          EOF

      - name: Summarize publish target
        run: |
          {
            echo "### npm publish target"
            echo ""
            echo "- Package: \`$(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")\`"
            echo "- Dist tag: \`$NPM_TAG\`"
            echo "- Dry run: \`$DRY_RUN\`"
            echo "- Ref: \`$GITHUB_REF_NAME\`"
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "This run verifies and packs the package only. It will not upload a new npm version."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DRY_RUN: ${{ inputs.dry_run || false }}
          NPM_TAG: ${{ inputs.npm_tag || 'latest' }}

      - name: Dry-run publish package
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --dry-run --access public --registry https://registry.npmjs.org --tag "$NPM_TAG"
        env:
          NPM_TAG: ${{ inputs.npm_tag || 'latest' }}

      - name: Publish package
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: |
          set +e

          unset NODE_AUTH_TOKEN
          npm publish --access public --registry https://registry.npmjs.org --tag "$NPM_TAG"
          publish_status=$?

          if [ "$publish_status" -ne 0 ] && [ -n "$NPM_PUBLISH_TOKEN" ]; then
            echo "Trusted publishing did not complete; retrying with NPM_TOKEN."
            NODE_AUTH_TOKEN="$NPM_PUBLISH_TOKEN" npm publish --access public --registry https://registry.npmjs.org --tag "$NPM_TAG"
            publish_status=$?
          fi

          if [ "$publish_status" -ne 0 ]; then
            {
              echo "### npm publish failed"
              echo ""
              echo "A registry \`E404\` or permission error during \`npm publish\` means the workflow authenticated without publish access."
              echo "Configure npm trusted publishing with \`npm trust github @moritzbrantner/ui --repo moritzbrantner/ui --file publish.yml --env npm --allow-publish\`, or add an \`NPM_TOKEN\` secret with publish access to the GitHub \`npm\` environment."
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$publish_status"
          fi
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag || 'latest' }}
