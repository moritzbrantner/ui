name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-validation:
    name: Fast Validation
    permissions:
      contents: read
      packages: read
    uses: moritzbrantner/reusable-workflows/.github/workflows/fast-validation.yml@workflow-standard-v1.3
    with:
      format_command: bun run format:check
      lint_command: bun run lint
      typecheck_command: bun run check-types
      build_command: bun run build
      unit_test_command: bun run test:unit
      timeout_minutes: 30
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  integration-validation:
    name: Integration Validation
    permissions:
      contents: read
      packages: read
    uses: moritzbrantner/reusable-workflows/.github/workflows/integration-validation.yml@workflow-standard-v1.3
    with:
      integration_command: bun run test:coverage
      package_check_command: bun run build && bun run test:package && bun run verify:consumer && bun run pack:dry
      timeout_minutes: 45
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  storybook-validation:
    name: Storybook Validation
    needs:
      - fast-validation
    permissions:
      contents: read
      packages: read
    uses: moritzbrantner/reusable-workflows/.github/workflows/storybook-validation.yml@workflow-standard-v1.3
    with:
      install_playwright: true
      install_playwright_browsers: chromium
      storybook_build_command: bun run build-storybook
      storybook_test_command: bun run test:storybook
      visual_command: bun run test:visual && bun run test:mobile-usability
      timeout_minutes: 60
      artifact_paths: |
        storybook-static
        playwright-report
        test-results
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  performance-validation:
    name: Performance Validation
    needs:
      - fast-validation
      - integration-validation
      - storybook-validation
    permissions:
      contents: read
      packages: read
    uses: moritzbrantner/reusable-workflows/.github/workflows/performance-validation.yml@workflow-standard-v1.3
    with:
      install_playwright: true
      install_playwright_browsers: chromium
      build_command: bun run build
      unlighthouse_command: bun run test:unlighthouse
      benchmark_command: bun run bench
      bundle_size_command: bun run verify:build-size
      timeout_minutes: 75
      artifact_paths: |
        unlighthouse-report
        .unlighthouse
        benchmark-results
        performance-results
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
